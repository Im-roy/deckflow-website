<head>

  <!-- Open Graph -->
  <meta property="og:title" content="AI Presentation Maker – Deckflow">

  <meta name="twitter:card" content="summary_large_image" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet" />

  <!-- Section-wise Stylesheets -->
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/header.css" />
  <link rel="stylesheet" href="./css/hero.css" />
  <link rel="stylesheet" href="./css/carousel.css" />
  <link rel="stylesheet" href="./css/problem-solution.css" />
  <link rel="stylesheet" href="./css/footer-cta.css" />
  <link rel="stylesheet" href="./css/footer.css" />
  <link rel="stylesheet" href="./css/animations.css" />
  <link rel="stylesheet" href="./css/responsive.css" />

  <!-- Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Deckflow",
      "applicationCategory": "BusinessApplication",
      "description": "AI-powered presentation generator that turns ideas into stunning slides in seconds.",
      "url": "https://deckflow.vercel.app/",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>

  <!-- Google Analytics -->
  <script src="config.js"></script>

    function gtag() { dataLayer.push(arguments); }

<body>
  <div class="page-backdrop" aria-hidden="true"></div>

  <div class="page">

    <!-- ═══════════════════════════════════════════════════════
           HEADER
           Text source: content.json → nav
           ═══════════════════════════════════════════════════════ -->
    <header class="site-header">
      <div class="shell shell--wide site-header__inner">

        <a class="brand" href="#hero" aria-label="Deckflow home">
          <span class="brand__mark" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="1" width="9" height="9" rx="2.5" fill="white" fill-opacity="0.9" />
              <rect x="12" y="1" width="9" height="9" rx="2.5" fill="white" fill-opacity="0.6" />
              <rect x="1" y="12" width="9" height="9" rx="2.5" fill="white" fill-opacity="0.6" />
              <rect x="12" y="12" width="9" height="9" rx="2.5" fill="white" fill-opacity="0.9" />
            </svg>
          </span>
          <span class="brand__copy">
            <strong data-brand></strong>
            <span data-tagline></span>
          </span>
        </a>

        <!-- Links injected by content-renderer -->
        <nav class="site-nav" aria-label="Primary navigation" data-render="navLinks"></nav>

        <a class="button button--primary" href="#" id="nav-cta" data-nav-cta onclick="alert('Coming soon'); return false;"></a>
      </div>
    </header>

    <main>

      <!-- ═══════════════════════════════════════════════════════
             HERO SECTION
             Text source: content.json → hero
             ═══════════════════════════════════════════════════════ -->
      <section class="hero section" id="hero" aria-labelledby="hero-heading">
        <div class="shell shell--wide hero__center">

          <!-- Centred copy -->
          <div class="hero__copy">
            <span class="eyebrow" data-content="hero.eyebrow"></span>
            <h1 class="hero__title" id="hero-heading" data-content="hero.headline"></h1>
            <p class="hero__lede" data-content="hero.subheadline"></p>

            <div class="hero__actions">
              <a class="button button--primary button--large" id="cta" href="#" onclick="alert('Coming soon'); return false;">
                <span class="button__icon" aria-hidden="true">✦</span>
                <span data-content="hero.cta"></span>
              </a>
              <span class="hero__microcopy" data-content="hero.microcopy"></span>
            </div>
          </div>

          <!-- Carousel — slides & dots injected by content-renderer -->
          <div class="hero__carousel-wrap">
            <section class="preview-frame card card--glass" aria-label="Slide preview carousel">
              <div class="carousel" role="region" aria-label="Slide examples" id="slide-carousel">
                <div class="carousel__track" id="carousel-track" data-render="slides"></div>
                <div class="carousel__dots" role="tablist" aria-label="Select slide" data-render="dots"></div>
              </div>
            </section>
          </div>

          <!-- Proof cards — injected by content-renderer -->
          <div class="hero__proof" role="list" data-render="proofCards"></div>

        </div>
      </section>

      <!-- ═══════════════════════════════════════════════════════
             PROBLEM / SOLUTION SECTION
             Text source: content.json → problemSolution
             ═══════════════════════════════════════════════════════ -->
      <section class="problem-solution section" id="problem-solution" aria-labelledby="ps-heading">
        <div class="shell shell--wide">

          <div class="section-heading">
            <span class="eyebrow" data-content="ps.eyebrow"></span>
            <h2 id="ps-heading" data-content="ps.headline"></h2>
            <p data-content="ps.subtext"></p>
          </div>

          <div class="comparison-layout">

            <!-- Problems card -->
            <article class="comparison-card comparison-card--dark">
              <span class="badge badge--soft-dark" data-content="ps.problems.badge"></span>
              <h3 data-content="ps.problems.title"></h3>
              <!-- Items injected by content-renderer -->
              <ul class="feature-list feature-list--warm" role="list" data-render="problems"></ul>
            </article>

            <!-- Solution card -->
            <article class="comparison-card comparison-card--light">
              <span class="badge badge--soft" data-content="ps.solution.badge"></span>
              <h3 data-content="ps.solution.title"></h3>
              <!-- Items injected by content-renderer -->
              <ul class="feature-list feature-list--cool" role="list" data-render="solutions"></ul>
            </article>

          </div>
        </div>
      </section>

      <!-- ═══════════════════════════════════════════════════════
             FOOTER CTA SECTION
             Text source: content.json → footerCta
             ═══════════════════════════════════════════════════════ -->
      <section class="footer-cta section" id="footer-cta" aria-labelledby="footer-cta-heading">
        <div class="shell shell--wide footer-cta__inner">
          <div class="footer-cta__glow" aria-hidden="true"></div>
          <span class="eyebrow" data-content="footerCta.eyebrow"></span>
          <h2 id="footer-cta-heading" data-content="footerCta.headline"></h2>
          <p data-content="footerCta.subtext"></p>
          <a class="button button--primary button--large" href="#" id="footer-cta-btn" onclick="alert('Coming soon'); return false;">
            <span class="button__icon" aria-hidden="true">✦</span>
            <span data-content="footerCta.cta"></span>
          </a>
          <span class="footer-cta__note" data-content="footerCta.note"></span>
        </div>
      </section>

    </main>

    <!-- ═══════════════════════════════════════════════════════
           SITE FOOTER
           Text source: content.json → footer
           ═══════════════════════════════════════════════════════ -->
    <footer class="site-footer" role="contentinfo">
      <div class="shell shell--wide site-footer__inner">
        <a class="brand" href="#hero" aria-label="Deckflow home">
          <span class="brand__mark" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="1" width="9" height="9" rx="2.5" fill="white" fill-opacity="0.9" />
              <rect x="12" y="1" width="9" height="9" rx="2.5" fill="white" fill-opacity="0.6" />
              <rect x="1" y="12" width="9" height="9" rx="2.5" fill="white" fill-opacity="0.6" />
              <rect x="12" y="12" width="9" height="9" rx="2.5" fill="white" fill-opacity="0.9" />
            </svg>
          </span>
          <span class="brand__copy">
            <strong data-brand></strong>
            <span data-tagline></span>
          </span>
        </a>
        <p class="site-footer__copy" data-content="footer.copyright"></p>
      </div>
    </footer>

  </div><!-- /page -->

  <!--
      Scripts:
       - content-renderer.js: loads content.json, populates the DOM, then inits carousel
       - carousel.js is now handled inside content-renderer.js (no longer needed separately)
    -->
  <script src="./js/content-renderer.js"></script>
</body>

</html>
